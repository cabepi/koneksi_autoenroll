<!DOCTYPE html>

<p class="text-slate-600 dark:text-slate-400 text-lg max-w-2xl mx-auto leading-relaxed">
                    Elija la opción que mejor describa su práctica para ayudarnos a personalizar su experiencia con las herramientas y estándares de cumplimiento adecuados.

<button class="group flex flex-col items-start p-8 rounded-xl bg-white dark:bg-slate-900/50 border-2 border-slate-200 dark:border-slate-800 hover:border-primary/50 dark:hover:border-primary/50 transition-all text-left shadow-sm hover:shadow-md">

<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">

                    </p>
</button>

<button class="group flex flex-col items-start p-8 rounded-xl bg-white dark:bg-slate-900/50 border-2 border-slate-200 dark:border-slate-800 hover:border-primary/50 dark:hover:border-primary/50 transition-all text-left shadow-sm hover:shadow-md">
