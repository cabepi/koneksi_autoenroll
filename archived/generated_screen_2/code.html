<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Facial Biometric Scan Modal - Koneksi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-colors">
    /* Custom brand color for Koneksi */
    .bg-koneksi-yellow { background-color: #eab308; } /* approximation of #f1b12b */
    .text-koneksi-yellow { color: #eab308; }
    .border-koneksi-yellow { border-color: #eab308; }
    
    /* Specific styling for the circular camera frame */
    .camera-frame {
      border: 4px solid #fef3c7; /* Light yellow border */
      box-shadow: 0 0 0 2px #fef3c7;
    }
  </style>
</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen font-sans">
<!-- BEGIN: Modal Overlay -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" data-purpose="modal-overlay">
<!-- BEGIN: Biometric Modal -->
<div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col" data-purpose="biometric-modal">
<!-- BEGIN: Modal Header -->
<header class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
<div class="flex items-center gap-2">
<!-- Smiley Face Icon -->
<span class="text-xl text-yellow-500">
<svg fill="currentColor" height="24" viewbox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M232,128A104,104,0,1,1,128,24,104.11,104.11,0,0,1,232,128Zm-104,88a88,88,0,1,0-88-88A88.1,88.1,0,0,0,128,216Zm40-108a12,12,0,1,1-12-12A12,12,0,0,1,168,108Zm-80,0a12,12,0,1,1-12-12A12,12,0,0,1,88,108Zm92.61,48a60,60,0,0,1-105.22,0,8,8,0,1,1,13.84-8,44,44,0,0,0,77.54,0,8,8,0,1,1,13.84,8Z"></path></svg>
</span>
<h2 class="text-lg font-bold text-gray-800">Escaneo biométrico facial</h2>
</div>
<!-- Close Button -->
<button class="text-gray-400 hover:text-gray-600 transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- END: Modal Header -->
<!-- BEGIN: Modal Content -->
<main class="flex-grow flex flex-col items-center py-10 px-6 text-center">
<!-- Camera Circular View -->
<div class="relative mb-6">
<div class="w-64 h-64 rounded-full bg-gray-50 camera-frame flex items-center justify-center overflow-hidden">
<!-- Simulated camera view placeholder -->
<div class="w-full h-full bg-slate-50 opacity-20"></div>
</div>
<!-- Liveness Detection Badge -->
<div class="absolute bottom-[-12px] left-1/2 -translate-x-1/2 bg-[#f1b12b] text-white text-[10px] font-bold px-4 py-1 rounded-full uppercase tracking-wider whitespace-nowrap">
            Prueba de Vida
          </div>
</div>
<!-- Instructions Section -->
<div class="mt-4 mb-8">
<p class="text-lg font-semibold text-gray-800 leading-tight">
            Coloca tu rostro dentro del círculo y parpadea para verificar
          </p>
<!-- Requirements icons -->
<div class="flex items-center justify-center gap-6 mt-4 text-gray-500 text-sm">
<div class="flex items-center gap-1">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 12.728L5.636 5.636" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span>Buena iluminación</span>
</div>
<div class="flex items-center gap-1">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span>Sin gafas</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="grid grid-cols-2 gap-4 w-full">
<button class="py-3 px-6 border border-gray-200 rounded-xl text-gray-600 font-bold hover:bg-gray-50 transition-all">
            Cancelar
          </button>
<button class="py-3 px-6 bg-[#f1b12b] hover:bg-[#e0a224] text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-yellow-200 transition-all">
<!-- Camera Aperture Icon -->
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
            Capturar
          </button>
</div>
</main>
<!-- END: Modal Content -->
<!-- BEGIN: Modal Footer -->
<footer class="bg-gray-50 py-3 flex items-center justify-center border-t border-gray-100">
<div class="flex items-center gap-2 text-[10px] text-gray-400 font-bold uppercase tracking-widest">
<!-- Shield Icon -->
<svg class="h-3 w-3" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          Verificación biométrica segura AES-256
        </div>
</footer>
<!-- END: Modal Footer -->
</div>
<!-- END: Biometric Modal -->
</div>
<!-- END: Modal Overlay -->
</body></html>
